<!DOCTYPE html>
<html>
<head>
<title>Eska Jewellery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#fff5f8;
margin:0;
padding:0;
text-align:center;
}

header{
background:pink;
padding:20px;
color:white;
}

.product{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px lightgray;
}

img{
width:250px;
max-width:90%;
border-radius:10px;
}

button{
background:green;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

#cart{
background:black;
color:white;
padding:15px;
margin:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>Eska Jewellery</h1>
<p>Artificial Jewellery Collection</p>
</header>

<div class="product">
<img src="bracelets.jpeg">
<h2>Bracelet</h2>
<p>Price: ₹30</p>
<button onclick="addToCart('Bracelet ₹30')">Add To Cart</button>
</div>

<div class="product">
<img src="mobile charms.jpeg">
<h2>Mobile Charms</h2>
<p>Price: ₹80</p>
<button onclick="addToCart('Mobile Charms ₹80')">Add To Cart</button>
</div>

<div class="product">
<img src="anti-tarnish earings.jpeg">
<h2>Anti-Tarnish Earrings</h2>
<p>Price: ₹80</p>
<button onclick="addToCart('Anti-Tarnish Earrings ₹80')">Add To Cart</button>
</div>

<div id="cart">
<h2>Cart</h2>
<p id="items">No items selected</p>

<button onclick="orderNow()">
Order On WhatsApp
</button>
</div>

<script>
let cart=[];

function addToCart(item){
cart.push(item);
document.getElementById("items").innerHTML=cart.join("<br>");
}

function orderNow(){
if(cart.length===0){
alert("Please select a product");
return;
}

let message="Hello Eska Jewellery,%0A%0AI want to order:%0A"+cart.join("%0A");

window.open(
"https://wa.me/917039603907?text="+message,
"_blank"
);
}
</script>

</body>
</html>
