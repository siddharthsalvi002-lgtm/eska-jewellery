<!DOCTYPE html>
<html>
<head>
<title>Eska Jewellery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#fff5f8;
margin:0;
padding:0;
}

.header{
background:black;
color:gold;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

.cart{
background:white;
color:black;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.product{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px lightgray;
}

.product img{
width:250px;
border-radius:10px;
cursor:pointer;
}

.qty{
font-size:22px;
margin:10px;
}

.qty button{
padding:8px 15px;
font-size:18px;
}

.whatsapp{
background:green;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:18px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">💎 Eska Jewellery</div>
<div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<div class="product">
<img src="bracelets.jpeg" onclick="window.open('bracelets.jpeg')">
<h2>Bracelet</h2>
<p>₹30</p>

<div class="qty">
<button onclick="changeQty('bracelet',-1)">➖</button>
<span id="bracelet">0</span>
<button onclick="changeQty('bracelet',1)">➕</button>
</div>
</div>

<div class="product">
<img src="mobile charms.jpeg" onclick="window.open('mobile charms.jpeg')">
<h2>Mobile Charms</h2>
<p>₹80</p>

<div class="qty">
<button onclick="changeQty('charms',-1)">➖</button>
<span id="charms">0</span>
<button onclick="changeQty('charms',1)">➕</button>
</div>
</div><div class="product">
<img src="anti-tarnish earings.jpeg" onclick="window.open('anti-tarnish earings.jpeg')">
<h2>Anti-Tarnish Earrings</h2>
<p>₹80</p>

<div class="qty">
<button onclick="changeQty('earrings',-1)">➖</button>
<span id="earrings">0</span>
<button onclick="changeQty('earrings',1)">➕</button>
</div>
</div>

<center>
<button class="whatsapp" onclick="orderNow()">
Order On WhatsApp
</button>
</center>

<script>
let bracelet=0;
let charms=0;
let earrings=0;

function changeQty(item,value){

if(item=="bracelet"){
bracelet=Math.max(0,bracelet+value);
document.getElementById("bracelet").innerText=bracelet;
}

if(item=="charms"){
charms=Math.max(0,charms+value);
document.getElementById("charms").innerText=charms;
}

if(item=="earrings"){
earrings=Math.max(0,earrings+value);
document.getElementById("earrings").innerText=earrings;
}

document.getElementById("cartCount").innerText=
bracelet+charms+earrings;
}

function orderNow(){

let msg="Hello Eska Jewellery%0A%0A";

if(bracelet>0)
msg+="Bracelet x"+bracelet+"%0A";

if(charms>0)
msg+="Mobile Charms x"+charms+"%0A";

if(earrings>0)
msg+="Anti-Tarnish Earrings x"+earrings+"%0A";

window.open(
"https://wa.me/917039603907?text="+msg
);
}
</script>

</body>
</html>
